name: Build and deploy Node.js app to Azure Web App - quizgo-app-frondend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Node 24 is very new; 20 is more stable for Azure

      - name: Install and Build
        run: |
          npm install
          npm run build
          # We removed 'npm test' here so the build doesn't fail 
          # while you are still fixing your React tests.

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: build/ # CRITICAL: Only upload the 'build' folder, not the whole project

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'quizgo-app-frondend'
          package: . # Since we only uploaded the build folder, '.' is now correct
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DE1B122DE7654B1E9BC821F7FA0A9DC2 }}